org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
# Defense in depth for the lib*.so exec trick (N1): ensure native libs
# are NOT stored uncompressed in the APK. Combined with manifest
# extractNativeLibs="true" + packaging.useLegacyPackaging=true, this
# guarantees Android's installer extracts libgraywolf.so to disk so it
# can be exec'd. AGP 8 default can be overridden by stale templates.
android.bundle.enableUncompressedNativeLibs=false
kotlin.code.style=official
