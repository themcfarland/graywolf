name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  rust-build:
    name: Rust (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: amd64
            platform: linux
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux
            use_cross: true
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            arch: arm
            platform: linux
            use_cross: true
          - os: macos-15
            target: x86_64-apple-darwin
            arch: amd64
            platform: darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            platform: darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: amd64
            platform: windows
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ALSA + udev dev (Linux)
        if: matrix.platform == 'linux' && matrix.use_cross == false
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install cross (Linux arm64)
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Compute version metadata
        id: ver
        shell: bash
        run: |
          ref="${{ github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Run cargo/cross from the workspace root so cross-rs mounts the
      # whole repo (it needs access to ../proto/graywolf.proto, which is
      # shared with the Go side and sits outside the graywolf-modem crate
      # directory).
      - name: Build with cross
        if: matrix.use_cross
        env:
          GRAYWOLF_VERSION: ${{ steps.ver.outputs.version }}
          GRAYWOLF_GIT_COMMIT: ${{ steps.ver.outputs.commit }}
        run: cross build --release --target ${{ matrix.target }} --bin graywolf-modem

      - name: Build with cargo
        if: matrix.use_cross == false
        env:
          GRAYWOLF_VERSION: ${{ steps.ver.outputs.version }}
          GRAYWOLF_GIT_COMMIT: ${{ steps.ver.outputs.commit }}
        run: cargo build --release --target ${{ matrix.target }} --bin graywolf-modem

      - name: Upload Rust binary (Unix)
        if: matrix.platform != 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: rust-${{ matrix.platform }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/graywolf-modem
          retention-days: 1

      - name: Upload Rust binary (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: rust-${{ matrix.platform }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/graywolf-modem.exe
          retention-days: 1

  frontend-build:
    name: Frontend (Vite + Svelte)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu
          npx vite build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  release:
    name: GoReleaser (Go + Docker + Packages)
    runs-on: ubuntu-latest
    needs: [rust-build, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download frontend dist
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: web/dist/

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all Rust binaries
        uses: actions/download-artifact@v5
        with:
          path: rust-artifacts/
          pattern: rust-*

      - name: Arrange Rust binaries for GoReleaser
        run: |
          mkdir -p rust-bin/{linux_amd64,linux_arm64,linux_arm,darwin_amd64,darwin_arm64,windows_amd64}
          cp rust-artifacts/rust-linux-amd64/graywolf-modem       rust-bin/linux_amd64/
          cp rust-artifacts/rust-linux-arm64/graywolf-modem       rust-bin/linux_arm64/
          cp rust-artifacts/rust-linux-arm/graywolf-modem         rust-bin/linux_arm/
          cp rust-artifacts/rust-darwin-amd64/graywolf-modem      rust-bin/darwin_amd64/
          cp rust-artifacts/rust-darwin-arm64/graywolf-modem      rust-bin/darwin_arm64/
          cp rust-artifacts/rust-windows-amd64/graywolf-modem.exe rust-bin/windows_amd64/
          chmod +x rust-bin/*/graywolf-modem || true
          # Flat copies for Docker builds (extra_files path is preserved in context)
          cp rust-bin/linux_amd64/graywolf-modem graywolf-modem-amd64
          cp rust-bin/linux_arm64/graywolf-modem graywolf-modem-arm64

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows binary for installer
        uses: actions/upload-artifact@v5
        with:
          name: windows-amd64-binary
          path: dist/graywolf_windows_amd64_v1/graywolf.exe
          retention-days: 1

  installer:
    name: Windows Installer
    runs-on: windows-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Windows Go binary
        uses: actions/download-artifact@v5
        with:
          name: windows-amd64-binary
          path: bin

      - name: Download Windows Rust binary
        uses: actions/download-artifact@v5
        with:
          name: rust-windows-amd64
          path: modem-bin

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $fullVersion = "${{ github.ref_name }}" -replace '^v', ''
          # VIProductVersion needs a 4-part numeric version; strip any pre-release suffix
          $numeric = ($fullVersion -split '-')[0] + ".0"
          $binaryPath = (Resolve-Path "bin/graywolf.exe").Path
          $modemPath  = (Resolve-Path "modem-bin/graywolf-modem.exe").Path
          $outFile    = "graywolf_${fullVersion}_Windows_x86_64.exe"
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPP_VERSION=$fullVersion" `
            "/DAPP_VERSION_NUMERIC=$numeric" `
            "/DBINARY_PATH=$binaryPath" `
            "/DMODEM_PATH=$modemPath" `
            "/DOUTFILE=$outFile" `
            packaging/nsis/graywolf.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }

      - name: Upload installer to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          gh release upload "${{ github.ref_name }}" "packaging/nsis/graywolf_${VERSION}_Windows_x86_64.exe" --clobber
