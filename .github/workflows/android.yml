name: Android

# PR / push:main: build an unsigned debug APK and upload as an artifact.
# Tag pushes (v*): also build a release-signed AAB + APK and attach them
# to the GitHub Release (which goreleaser/release.yml creates in parallel).
# Phase 5 of the plan will add a step that auto-uploads the AAB to the
# Play Internal Testing track.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  # Manual trigger. Two uses: (a) re-run the build on transient network
  # failures, and (b) promote an already-released version to the closed
  # beta track via the promote-to-closed job (provide `version`).
  workflow_dispatch:
    inputs:
      version:
        description: 'Released version to promote to a testing track (X.Y.Z, no v). Leave blank for a plain build re-run.'
        required: false
        type: string
      track:
        description: 'Play track to promote into. alpha = closed testing (private beta); beta = open testing.'
        required: false
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - internal

permissions:
  # write required so the release-sign job can attach the signed AAB
  # + APK to the GH Release that goreleaser creates on tag push.
  contents: write

jobs:
  build:
    name: Build (debug APK)
    runs-on: ubuntu-latest
    # Skip on workflow_dispatch promote runs -- those only need the
    # promote-to-closed job, not a fresh APK build.
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so any tooling that walks tags (e.g. release
          # fixture generators) keeps working if we extend this job later.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Node is needed by the Gradle webBuild task, which runs
      # `npx vite build` to refresh web/dist before goCrossCompile
      # embeds it via go:embed. Tracks web/package-lock.json so this
      # job's npm cache invalidates when frontend deps change.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: |
          npm ci
          # rollup's optional binary deps don't always install via npm
          # ci on linux runners; this matches the proven pattern in
          # release.yml's frontend-build job.
          npm install @rollup/rollup-linux-x64-gnu

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked --version ^4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Pulls the Android SDK platforms / build-tools / NDK at the
      # versions the Gradle script expects. NDK version is pinned to
      # match cargo-ndk's expectation and the floor enforced by
      # scripts/check-android-toolchain.sh (r27+). compileSdk and
      # build-tools 36 match android/app/build.gradle.kts.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;27.2.12479018'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # Diagnostic: prove the NDK clang wrappers are at the path Gradle
      # expects before invoking the build. Cheap insurance against silent
      # NDK-version drift.
      - name: NDK layout sanity
        run: |
          set -euo pipefail
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT:-<unset>}"
          ls -1 "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep -E "^(x86_64|aarch64)-linux-android[0-9]+-clang$" | sort

      - name: Build debug APK
        working-directory: android
        # Do NOT use `env: ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_HOME }}`
        # here. `${{ env.X }}` evaluates against the workflow-context env,
        # which doesn't reflect variables setup-android exports at the
        # shell level — the expression resolves to "" and poisons the
        # downstream NDK path. setup-android sets ANDROID_NDK_HOME as a
        # real shell env var; the gradle script's fallback chain
        # ANDROID_NDK_ROOT -> ANDROID_NDK_HOME (with .takeUnless { blank }
        # so an empty string is treated as unset) handles that cleanly.
        #
        # --info surfaces the underlying go/cargo stdout that Gradle's
        # Exec task would otherwise buffer and discard. On failure the
        # actual error message lands in the run log instead of just
        # "Process 'command 'go'' finished with non-zero exit value 1".
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --info

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: graywolf-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ------------------------------------------------------------------
  # release-sign — only on v* tag pushes. Builds a release-signed
  # AAB (for Play upload) and APK (for sideload / GH Release), then
  # attaches both to the GH Release that goreleaser created via the
  # parallel release.yml workflow. needs:build ensures the cheap
  # PR-style build passed first; we never try to sign something the
  # debug path already showed is broken.
  # ------------------------------------------------------------------
  release-sign:
    name: Release sign (AAB + APK)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    # The `secrets` context is not allowed in step-level `if:`, so resolve
    # "is the Play service account configured?" once into a job-level env
    # var (env IS allowed in if). Gates the Play-upload step below.
    env:
      HAVE_PLAY_SA: ${{ secrets.GRAYWOLF_PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # Separate key from the build job so the release-sign cache
          # doesn't churn on every PR push; share the prefix so the
          # restore-keys fallback can still warm-start from build's cache.
          key: android-release

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked --version ^4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;27.2.12479018'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-release-

      - name: Build signed AAB and APK
        working-directory: android
        env:
          GRAYWOLF_KEYSTORE_BASE64: ${{ secrets.GRAYWOLF_KEYSTORE_BASE64 }}
          GRAYWOLF_KEYSTORE_PASSWORD: ${{ secrets.GRAYWOLF_KEYSTORE_PASSWORD }}
          GRAYWOLF_KEY_ALIAS: ${{ secrets.GRAYWOLF_KEY_ALIAS }}
          GRAYWOLF_KEY_PASSWORD: ${{ secrets.GRAYWOLF_KEY_PASSWORD }}
        # --info kept (matches the build job) so any go/cargo failure
        # in this signed path lands a real error message in the log,
        # not just Gradle's wrapped exit-code-1 message.
        run: ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon --stacktrace --info

      - name: Stage release artifacts
        id: stage
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          cp android/app/build/outputs/bundle/release/app-release.aab "staging/graywolf-${version}.aab"
          cp android/app/build/outputs/apk/release/app-release.apk     "staging/graywolf-${version}.apk"
          ls -la staging/
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature matches the upload keystore
        run: |
          set -euo pipefail
          v="${{ steps.stage.outputs.version }}"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs \
            "staging/graywolf-${v}.apk" \
            | grep -E "SHA-256 digest|Signer #1 certificate"

      - name: Upload signed AAB + APK to the GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # release.yml runs in parallel and creates the GH Release via
        # goreleaser. There's a race: this job can finish staging before
        # goreleaser has created the release. Retry briefly (every 30s
        # for up to 3 min) to absorb that — well under the 5-7 min the
        # goreleaser path takes.
        run: |
          set -euo pipefail
          v="${{ steps.stage.outputs.version }}"
          for i in 1 2 3 4 5 6; do
            if gh release upload "${GITHUB_REF_NAME}" \
                 "staging/graywolf-${v}.aab" \
                 "staging/graywolf-${v}.apk" \
                 --clobber; then
              echo "uploaded on attempt $i"
              exit 0
            fi
            echo "Release ${GITHUB_REF_NAME} not yet available, retrying ($i/6)..."
            sleep 30
          done
          echo "::error::Release ${GITHUB_REF_NAME} never appeared; check goreleaser job."
          exit 1

      # Auto-upload the signed AAB to Play Internal Testing. Gated on the
      # service-account secret so it safely skips (not fails) until the
      # Google Cloud service account is created and stored as
      # GRAYWOLF_PLAY_SERVICE_ACCOUNT_JSON. Lands in the Internal track
      # only; humans promote to the closed beta track separately, so a
      # CI tag never reaches external testers automatically.
      - name: Upload AAB to Play Internal Testing
        if: env.HAVE_PLAY_SA == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GRAYWOLF_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nw5w.graywolf
          releaseFiles: staging/graywolf-*.aab
          track: internal
          status: completed

      - name: Upload signed AAB as workflow artifact (manual fallback)
        uses: actions/upload-artifact@v5
        with:
          name: graywolf-release-aab
          path: staging/graywolf-*.aab
          retention-days: 30

  # ------------------------------------------------------------------
  # promote-to-closed — manual (workflow_dispatch) promotion of an
  # already-released version to a Play testing track (default: alpha =
  # closed testing, the private beta). Keeping this a deliberate human
  # action means a CI tag never auto-ships to external beta testers; you
  # choose which build they get. Run from the Actions tab (or:
  #   gh workflow run android.yml --field version=X.Y.Z --field track=alpha).
  # ------------------------------------------------------------------
  promote-to-closed:
    name: Promote to testing track
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
    env:
      HAVE_PLAY_SA: ${{ secrets.GRAYWOLF_PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - name: Validate version input
        run: |
          set -euo pipefail
          v="${{ github.event.inputs.version }}"
          if ! printf '%s' "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version must be X.Y.Z (no leading v); got '$v'"
            exit 1
          fi

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # Promote (not re-upload): the version is already in Play (from the
      # Phase 5 auto-upload to internal). fastlane supply moves that
      # versionCode to the chosen track. Re-uploading the AAB would fail
      # with "version code already used", which is why this isn't an
      # upload action. versionCode is derived from X.Y.Z the same way
      # android/app/build.gradle.kts derives it (M*1e6 + m*1e4 + p*100).
      - name: Promote to the chosen track via fastlane
        if: env.HAVE_PLAY_SA == 'true'
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GRAYWOLF_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          IFS=. read -r MAJ MIN PAT <<< "${{ github.event.inputs.version }}"
          VC=$(( MAJ*1000000 + MIN*10000 + PAT*100 ))
          echo "Promoting versionCode $VC -> track '${{ github.event.inputs.track }}'"
          bundle exec fastlane promote \
            version_code:"$VC" \
            from:internal \
            to:"${{ github.event.inputs.track }}"
