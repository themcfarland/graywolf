# Authoritative list of user-facing release notes. Newest first.
# Plain English only. Plain ASCII only -- no emojis, no em dashes,
# no smart quotes, no non-ASCII punctuation. Keep the wording human
# and in the operator's voice; no package names, API paths, or other
# internals. style: info = informational announcement. style: cta =
# call-to-action (operator must do something). link: optional hash
# route the body references via [text](link) markdown; renderer only
# accepts internal #/... routes.

- version: "0.14.9"
  date: "2026-06-28"
  style: info
  schema_version: 1
  link: "#/map"
  title: "Steadier map tracks, manual fixed-point entry, and a SmartBeaconing tracker type"
  body: |
    Station tracks on the Live Map are steadier. A track no longer doubles
    back on itself when a duplicate or out-of-order fix comes in, and a
    callsign's trail stays on screen even when the newest fix moves outside
    the current view. On narrow displays the coordinate readout no longer
    overlaps the map status text.

    You can now type coordinates straight into the fixed point dialog
    instead of only dropping a pin, so it is easy to place a point at an
    exact known location. The Live Map also remembers the time range you
    picked for its layers as you navigate away and reload.

    Beacons gain a tracker beacon type in the editor, which turns on
    SmartBeaconing so a moving station beacons more often when it is
    turning or speeding up and less often when it is sitting still. The
    iGate TX channel can now be cleared to run a receive-only iGate.

    Smaller fixes: the RF Only map filter no longer shows APRS-IS stations,
    the AX.25 terminal no longer overlaps lines on carriage returns, and on
    Android the top bar stays below the system status bar. On Windows,
    Graywolf now warns when audio enhancements are turned on for your
    capture device, since they distort the received signal.

- version: "0.14.8"
  date: "2026-06-22"
  style: info
  schema_version: 1
  link: "#/logs"
  title: "APRS Logs: non-printable bytes, auto-refresh, and Mic-E comments"
  body: |
    The APRS Logs tab can now keep up with live traffic on its own. New
    auto-refresh and auto-scroll toggles pull in and follow new packets
    without you reloading the page. Packets that carry non-printable
    bytes now show them plainly, with a Hex toggle to flip the raw frame
    between a readable view and a straight hex dump. Mic-E mobile beacons
    now show their comment text instead of dropping it.

    Smaller touches: the map status bar shows its red error dot right
    away when you open it offline, the default theme has better contrast
    on its primary color, and on Android the message compose bar stays
    above the on-screen keyboard. The handbook also gains notes on
    testing VOX and Digirig tone PTT keying, plus a Serial RTS PTT
    recommendation for the Digirig Mobile.

- version: "0.14.7"
  date: "2026-06-20"
  style: info
  schema_version: 1
  link: "#/map"
  title: "Lost-connection warning, world map and clock fixes, steadier audio"
  body: |
    When the app loses contact with the server it now shows a clear
    lost-connection warning instead of filling the dashboard and logs
    with placeholder data. The dashboard shows a banner with dashes in
    place of the live numbers, and the logs and map show a red error
    dot, so you can tell a dropped connection from a quiet one.

    The world map no longer offers a Download button once you have
    already downloaded it. And hosts that are in fact synced over NTP no
    longer get a false clock-not-synchronized warning at startup, which
    most often hit a Raspberry Pi with no battery-backed clock.

    Returning to the Live Map now applies your saved layer toggles and
    RF filters right away, instead of waiting until you toggle a
    checkbox. Audio capture is also steadier on older 32-bit Linux
    systems, where a timestamp-decoding bug could flood the logs and
    keep rebuilding the audio stream.

- version: "0.14.6"
  date: "2026-06-20"
  style: info
  schema_version: 1
  link: "#/map"
  title: "Fixed points sync across devices, jump from a log to the map, mobile map fixes"
  body: |
    Fixed map points you add now live on the server instead of in a
    single browser, so they show up on every device you sign in from and
    come back correctly when you return to the map. On a touchscreen you
    can drop one with a long press on the map background.

    Each packet log row now has a scope button next to the callsign
    whenever the packet carries a position. Click it to jump to the Live
    Map framed on that fix, the reverse of the map popup's link back to
    the logs. This now works for position, Mic-E, weather, object, and
    item reports.

    The Live Map behaves better in a phone browser: a two-finger pinch no
    longer accidentally rotates the map, the Layers button no longer
    covers the compass in portrait, and the bottom scale and counters
    stay on screen as the address bar collapses. The Direct RX filter
    now also honors the time range you have selected.

    There is a new PTT method for the Digirig Lite, on desktop and
    Android, which keys the radio with a tone on the right audio channel.
    Pick Digirig Lite Tone in your PTT settings if you use one. And
    radioless stations can now create APRS-IS-only beacons without
    configuring a channel; saving one turns on the iGate it needs.

- version: "0.14.5"
  date: "2026-06-19"
  style: info
  schema_version: 1
  link: "#/beacons"
  title: "Beacon to APRS-IS without a radio"
  body: |
    Beacons now have a Destination control that picks where each one
    goes: RF only, RF plus APRS-IS, or APRS-IS only with no radio. The
    new APRS-IS only option puts a beacon straight onto the APRS-IS
    network without keying a radio, so a host with just an internet
    connection can still beacon its position. Turn the iGate on first so
    there is an APRS-IS connection to send through.

    Along the way, APRS-IS beacons now reliably reach the network and
    show up in your packet log, and a beacon whose callsign,
    destination, or path is not a valid APRS address is rejected when
    you save it, instead of quietly never transmitting.

- version: "0.14.4"
  date: "2026-06-19"
  style: info
  schema_version: 1
  link: "#/map"
  title: "Map toggles that stick, beacon slot timing and object altitude, Android fixes"
  body: |
    Your Live Map layer toggles now stick between sessions. Stations,
    Trails, Weather, My Position, Fixed Points, and the RF filters all
    come back the way you left them, instead of resetting to the
    defaults on your next visit.

    The beacon editor gains a slot timing field, so you can set how many
    seconds past the hour a beacon transmits and stagger it from your
    others instead of only picking a plain interval. Object beacons can
    now also carry an altitude.

    Two Android fixes: the app no longer crashes on launch on devices
    with no GPS hardware, such as Facebook Portal, Android TV boxes, and
    emulators, and the status-bar notification icon no longer shows up as
    a solid white square.

- version: "0.14.3"
  date: "2026-06-18"
  style: info
  schema_version: 1
  title: "Android-focused beta: launch crash fix"
  body: |
    This is an Android-focused beta that fixes a crash some Android
    users hit right after opening the app. The app would show a white
    screen for a few seconds, then close and drop off the notification
    shade. It now starts up normally.

    The beta is aimed at confirming the fix on affected devices,
    notably Android 11. Desktop and server installs are unchanged, and
    no action is needed on your part.

- version: "0.14.2"
  date: "2026-06-17"
  style: info
  schema_version: 1
  link: "#/map"
  title: "APRS popup tweaks, dBFS packet levels, and map polish"
  body: |
    APRS object popups on the Live Map now show the originating
    callsign, so you can see which station sent an object or item.

    The QRZ action on a station popup now drops the SSID before looking
    up the callsign, so it opens the base station's qrz.com page.

    Per-packet audio levels are now reported in dBFS, matching the units
    on the real-time audio meter so the two line up.

    The station-click actions on the map were restyled to match the map
    context menu.

- version: "0.14.1"
  date: "2026-06-17"
  style: info
  schema_version: 1
  link: "#/map"
  title: "Map popup actions, offline World map, and audio, GPS, and map fixes"
  body: |
    Station popups on the Live Map gain a row of quick actions for
    stations you actually heard: Message opens a direct-message
    thread, APRS logs jumps to the packet log already filtered to that
    callsign, and QRZ opens the station's qrz.com page in a new tab.

    The downloadable low-detail World map now shows up in the offline
    maps download list, set apart from the country list, so you can
    grab a global basemap for areas you have not downloaded in detail.

    Audio: you can now enter ALSA devices in shorthand like hw:0,0 or
    plughw:1 instead of the long canonical name, and the audio
    handbook documents custom .asoundrc PCMs and a low-CPU 8 kHz
    capture setup.

    GPS over a serial port shares better with PTT: Graywolf no longer
    takes an exclusive lock on the serial line, so shared-line PTT
    keeps working after a reboot, and it leaves RTS/DTR deasserted
    when opening the port so attaching GPS will not key your radio.

    Smaller touches: better contrast for the map temperature chips,
    including night mode; the Android app launches faster by booting
    the backend in the background instead of blocking the splash
    screen; a clearer scroll hint at the bottom of long settings
    pages; and fixes for a rare crash when leaving the map and a
    false "mixed build" warning at startup.

- version: "0.14.0"
  date: "2026-06-15"
  style: info
  schema_version: 1
  link: "#/map"
  title: "Live weather radar on the map, plus map filters, log tools, and theme options"
  body: |
    Weather radar comes to the Live Map. Turn on the new Radar layer
    in the Map Layers panel to see current precipitation drawn right
    over your stations, with an opacity slider so you can dial it back
    as far as you like. The United States gets high-detail NEXRAD
    coverage; switch the Radar region on Maps settings to get maps
    generated by RainViewer for the rest of the globe.

    APRS Logs: click the magnifying glass icon to see a full hex and
    ASCII dump of the packet's raw frame for deep inspection. Each
    received packet now shows the audio level it decoded at, so you
    can spot a too-hot or too-quiet signal at a glance.

    There is also a new downloadable low-detail world map, so the area
    around your stations still has a basemap when you are off-grid and
    far from any region you have downloaded.

    Live Map: a new RF Only filter hides stations that only reached
    you gated in from the internet, leaving just what your radios
    actually heard. You can now drop your own labeled fixed points on
    the map -- a repeater site, a meeting spot, a landmark -- and they
    stay put across reloads. Station ages on the map are now measured
    against your host's clock, so "heard 2m ago" stays correct even
    when a packet carries a skewed timestamp.

    KISS interfaces: each KISS TNC interface now has its own
    enable/disable toggle, so you can take one offline and bring it
    back without deleting and recreating it. Serial KISS setup is
    easier too, with dropdowns for detected serial ports and standard
    baud rates.

    Appearance: two new High Contrast themes, day and night, for
    better readability, plus a new interface display-size setting
    under Preferences that scales the whole UI up or down to taste.

    Smaller touches: the dashboard uptime now reads in days, weeks, or
    months instead of a giant hour count; Graywolf warns you at
    startup if the system clock is not synced, since bad time breaks
    logs and APRS timestamps; and fixes land for CAT/rigctld PTT
    status reads and a rare crash on 32-bit ARM iGates under heavy
    traffic.

- version: "0.13.16"
  date: "2026-06-11"
  style: info
  schema_version: 1
  link: "#/system-logs"
  title: "System Logs tab, wind barbs, VOX keying, plus map and audio fixes"
  body: |
    New System Logs tab: you can now read Graywolf's own daemon log
    right in the web UI, filter it by level and number of lines, and
    see the same structured detail it writes to the console or journal.
    The old Logs tab that shows received traffic is now called APRS
    Logs.

    VOX radios key properly now. Pick the new VOX method on the PTT
    settings if your radio keys off transmit audio. Graywolf sends a
    short half-second lead-in tone ahead of each packet so the VOX
    relay is fully closed before any data goes out, so no more clipped
    frames.

    Live map: weather stations now show standard wind barbs instead of
    a text wind readout, so you can read speed and direction at a
    glance.

    Maps: in-progress offline map downloads now have a working Cancel
    button that stops the transfer and cleans up the partial file. And
    if maps will not activate, the error now tells you in plain
    language to go to Settings and register (or re-register) your
    device, instead of a raw server message.

    Map accuracy: hop counts no longer over-count generic path aliases
    like WIDEn-N or Internet-gated markers; stations heard both
    directly and through a digipeater no longer disappear from the
    Direct RX view; and western-hemisphere Mic-E position reports that
    used to log but never plot now decode and show up on the map.

    iGate: the Simulation toggle now sticks, so the page reflects
    whether simulation is actually running after you reload or restart.

    Audio: fixed a transmit problem where some USB radio interfaces
    (Signalink, DigiRig, AIOC) flooded the log with errors and sent no
    transmit audio. Graywolf now picks a playback format the device
    actually supports.

    Raspberry Pi and 32-bit ARM: fixed a modem crash loop on the
    latest Raspberry Pi OS (the t64 change). There is also a new armv7l
    build with NEON for Cortex-A7 and newer 32-bit boards that decodes
    faster than the armv6 build. If you are not sure which 32-bit
    download to use, the README now has a hardware selection table.

    Android: the TCP (server) KISS type can be selected again so an
    on-device iGate client can connect over loopback, with a Local only
    option that keeps that KISS port off your LAN.

    Smaller touches: the packet log now shows the channel name instead
    of a number, and the dashboard Beacon Now button shows an object
    beacon's object name.

- version: "0.13.15"
  date: "2026-06-02"
  style: info
  schema_version: 1
  title: "Linux audio detection fixed when radio is plugged in after boot"
  body: |
    If your USB radio or sound card was connected after the graywolf
    service started, Detect Audio came up empty and channels would
    not bind even when you typed the right ALSA device name. A
    systemd hardening flag we were shipping was the culprit on
    several Linux distributions. Upgrade and restart graywolf;
    nothing else to do on your end.

- version: "0.13.14"
  date: "2026-06-01"
  style: info
  schema_version: 1
  link: "#/maps"
  title: "Offline maps work for the whole LAN now"
  body: |
    The offline-maps setup was not fully offline-ready in v0.13.12:
    the map style file was still being pulled from the maps host
    by the browser, so if your laptop's IP changed (WiFi to
    hotspot) or if a guest joined your LAN, the map came up blank.
    Graywolf now caches the style itself, so once you have loaded
    the map page once with Graywolf online, every browser on your
    network can render it even with the internet down. If you
    click Download on a region, the label fonts for that region
    get pre-warmed in the background so an offline pan finds them.

- version: "0.13.13"
  date: "2026-05-30"
  style: info
  schema_version: 1
  link: "#/kiss"
  title: "Pi 1 / Pi Zero builds restored, plus iGate your KISS app's TX"
  body: |
    Linux armv6 (Pi 1 / Pi Zero / 32-bit Pi OS) builds are back
    after dropping out in v0.13.6. Download the armv6l .deb, .rpm,
    or .tar.gz from the GitHub release page.

    Heads up for CM108 HID PTT users (the Masters Communications
    DRA-50 / DRA-65, DigiRig, AIOC, and similar USB sound-card
    cables): this release also rewires how Graywolf finds your HID
    device on Linux. If your PTT stops keying after upgrade -- or
    if device detection starts failing -- please open an issue so
    we can sort it quickly.

    Also new: if you point YAAC, Xastir, APRSdroid, or another KISS
    client at Graywolf for transmission, you can now have those
    packets reach APRS-IS without configuring a separate APRS-IS
    connection in the client. Open Settings, edit the KISS
    interface, and turn on "Also forward transmissions from
    connected clients to APRS-IS". Only available on Modem-mode
    interfaces; the iGate must be on, and its existing filter rules
    still apply.

- version: "0.13.12"
  date: "2026-05-29"
  style: cta
  schema_version: 1
  link: "#/beacons"
  title: "Beacons: position format and ambiguity, plus digipeater and map fixes"
  body: |
    Beacons: you can now pick the format each beacon uses on the air --
    Compressed is the densest and most precise, Uncompressed is the
    standard form, and Mic-E is the most efficient. Mic-E is the
    standard for mobile and tracker stations; if you have a tracker
    beacon, consider switching it to Mic-E -- shorter packets, less
    channel time, same precision.

    Uncompressed and Mic-E beacons can also use position ambiguity to
    publish a deliberately coarse position. Pick Block, Neighborhood,
    Town, or Region in the beacon form. Useful for home QTH privacy or
    for group meetups where address-level precision isn't wanted.
    Existing beacons keep transmitting exactly the same packets they
    always did.

    Digipeater: the Digipeater settings page now has a Blocked Stations
    list. Add a callsign -- with or without an SSID, with a trailing
    wildcard like CALL-* if you want every SSID -- and the digipeater
    will stop repeating that station's frames. The iGate and packet log
    are not affected: you'll still see and log the original traffic.
    Useful when one nearby station is flooding the channel with
    malformed beacons or you just want it off the digipeater chain.

    Offline maps: a downloaded map region now keeps rendering even
    when the host can't reach the map catalog server -- previously a
    region could stop drawing after a reboot if the catalog was
    unreachable.

    Live map: stations whose last position is outside your current
    view no longer linger as stale markers when you pan or zoom, and
    trail dots now respect the time-range filter -- a 15-minute window
    no longer shows trail positions from days ago.

- version: "0.13.11"
  date: "2026-05-27"
  style: info
  schema_version: 1
  link: "#/beacons"
  title: "Object beacons, plus a transmit test for your channels"
  body: |
    Object beacons: you can now beacon a named object -- a repeater, a
    hospital, an event site -- so it shows up on the map as "NAME (via
    your callsign)", making it clear that you put it on the air. Pick
    "Object" when you add or edit a beacon. This is the proper way to
    do it, instead of overriding your station callsign.

    Channel transmit test: every transmit-capable channel now has a
    Test TX menu that sends a real signal out the radio -- your
    callsign in Morse code, a steady 1200 or 2400 Hz tone, or an
    alternating warble. Handy for checking your audio levels and PTT
    keying. This replaces the old Test Tone button.

- version: "0.13.10"
  date: "2026-05-23"
  style: info
  schema_version: 1
  link: "#/channels"
  title: "Simpler channel deletion"
  body: |
    Deleting a channel now just asks you to confirm with a button,
    instead of making you type the channel's exact name first. This
    also fixes a problem where deleting a channel did nothing on the
    Android app.

- version: "0.13.9"
  date: "2026-05-23"
  style: info
  schema_version: 1
  link: "#/map"
  title: "Right-click the map; USB TNC support on Android"
  body: |
    Right-click anywhere on the map to copy that spot's coordinates
    or its Maidenhead grid square, or to drop a fixed beacon right
    there. Works on macOS, Linux, and Windows.

    On the upcoming Graywolf APRS Android app, you can now connect a
    KISS TNC or radio over a USB cable, not just Bluetooth. Nothing to
    do on other platforms.

- version: "0.13.8"
  date: "2026-05-22"
  style: info
  schema_version: 1
  title: "Android display fix"
  body: |
    Fixes oversized text on some Android phone screens. Nothing
    changes on macOS, Linux, or Windows; no action needed.

- version: "0.13.7"
  date: "2026-05-21"
  style: info
  schema_version: 1
  title: "Continued Android app preparation"
  body: |
    More groundwork for the upcoming Graywolf APRS Android app.
    Nothing changes on macOS, Linux, or Windows; no action needed.

- version: "0.13.6"
  date: "2026-05-21"
  style: info
  schema_version: 1
  title: "Groundwork for the Android app"
  body: |
    This release lays the groundwork for the Graywolf APRS Android
    app, which will be available soon on the Google Play Store.
    Nothing for you to do; other platforms are unchanged.

- version: "0.13.5"
  date: "2026-05-17"
  style: info
  schema_version: 1
  title: "KISS TNC transmit, serial TNC support, channel stats, cleaner audio detection"
  link: "#/kiss"
  body: |
    When Graywolf connects out to a KISS TNC, that connection can now
    transmit, not just receive. New TNC client connections are set up
    to transmit by default, and any existing connection that was stuck
    receive-only is upgraded automatically when you start this version.

    If you have a TNC client that you deliberately want to keep
    receive-only, or one sharing a channel with a sound-card modem,
    it is left as-is. Nothing else to reconfigure.

    You can now attach a KISS TNC over a serial port, not just over
    the network. On the KISS settings page pick the new Serial
    interface type, enter the device path (for example /dev/ttyUSB0
    or /dev/ttyACM0) and the baud rate, and attach it to a channel
    just like a network TNC. Graywolf opens the port, keeps the link
    up, and if the device is unplugged it backs off and reconnects on
    its own when it comes back, with no restart needed. Changing the
    device, baud, or mode and saving takes effect right away.

    KISS TNC channels now report their own receive and transmit
    counts, so each channel card shows that channel's traffic at a
    glance instead of a shared total.

    Audio device detection is tidier. The same sound card no longer
    shows up several times in the device lists, devices already in use
    by something else are clearly marked, and a device you have
    configured for output stays visible while detection is running.

    Setting up the first user with a very long password, such as a
    password manager's 100-character default, now shows a clear error
    right away instead of a confusing generic failure. Passwords are
    limited to 72 bytes.

    Weather station popups on the map have an improved display. Click
    a weather station and you now get a clearer, fuller readout of its
    current conditions.

- version: "0.13.4"
  date: "2026-05-09"
  style: info
  schema_version: 1
  title: "PTT improvements, profiling, and runtime metrics"
  link: "#/channels"
  body: |
    Each channel card now shows which PTT method it is using, so you
    can see at a glance whether a channel is keying via VOX, CAT, GPIO,
    CM108, AIOC, or its KISS TNC.

    Editing a channel's PTT settings now takes effect right away. The
    old PTT is torn down and the new one is brought up as part of the
    save, so you no longer have to restart anything to pick up the
    change.

    Channels backed by a KISS TNC handle their own PTT through the TNC
    itself, so Graywolf no longer accepts a separate PTT configuration
    on those channels and tells you why if you try.

    There is a new optional -pprof flag that turns on a debug listener
    for memory and CPU profiling, and the /metrics endpoint now reports
    Go runtime stats so you can graph memory and goroutines over time.
    See the monitoring page in the handbook for capture commands.

    Graywolf also caps the in-memory station cache at 50,000 entries
    so memory stays bounded under heavy APRS-IS traffic, and a few
    smaller memory wins shave a couple of megabytes off resident size.

    Nothing to reconfigure.

- version: "0.13.3"
  date: "2026-05-09"
  style: info
  schema_version: 1
  title: "Bug fixes: Windows audio devices, beacon errors, tooltips, and more"
  body: |
    A round of bug fixes:

    On Windows, picking an audio device sometimes selected the wrong
    one when several devices shared the same name. Each device is now
    uniquely identified, so the device you pick is the device that
    gets used.

    The Send Now button on a beacon was silently swallowing errors.
    If the send fails, the UI now tells you why.

    Tooltips on the light themes had unreadable white text on a light
    background. They now use the correct color.

    The Live Map's RF count now shows both the direct-heard count and
    the total when the Direct RX filter is on, so the number matches
    the dots on the map.

    The I-Gate enable/disable toggle now takes effect immediately
    without restarting Graywolf.

    Outbound message status is now logged to the console so you can
    see why a message stalled, including whether the rate governor or
    RF availability blocked it.

    Nothing to reconfigure.

- version: "0.13.2"
  date: "2026-05-06"
  style: info
  schema_version: 1
  title: "Messages: fix outbound stuck on KISS-TNC channels"
  body: |
    If your station was set up with a KISS-TNC channel, for example
    direwolf running on a separate machine, outbound APRS messages
    would sit on the Messages tab showing the clock icon and never
    transmit. They now go out as expected. Nothing to reconfigure.

- version: "0.13.1"
  date: "2026-05-05"
  style: info
  schema_version: 1
  title: "APRS: fix Mic-E longitude decoding bug"
  body: |
    Fixes a bug in Mic-E position decoding that could produce
    bogus longitudes on certain packets. Stations using Mic-E
    encoding (most mobile rigs) will now plot correctly.

- version: "0.13.0"
  date: "2026-05-05"
  style: info
  schema_version: 1
  title: "Actions: trigger scripts or webhooks from APRS messages"
  link: "#/actions"
  body: |
    Graywolf has a new feature called Actions. An Action runs a
    local script or calls a webhook when an APRS message arrives,
    so you can build integrations, automation, bots, security
    systems, and more. The possibilities are endless.

    Actions can be secured with a one-time password generated by an
    authenticator app on your phone. This does not encrypt the
    message or obscure its meaning; it authenticates the message as
    coming from you.

    An Action's reply can span more than one APRS message. Open an
    Action and set Max reply lines to anywhere from 1 to 5. Each
    line of your script's output above the first is sent as its own
    on-air message. Every extra line is one more RF frame plus its
    own ack and retries, so multi-message replies cost real airtime
    on a shared channel. Keep the count low for chatty scripts.

    Open the new Actions tab in the sidebar to set one up. The full
    walkthrough lives in the handbook at
    https://chrissnell.com/software/graywolf/actions.html.

- version: "0.12.6"
  date: "2026-05-02"
  style: info
  schema_version: 1
  title: "Fix: Live Map forgets where you left it"
  link: "#/map"
  body: |
    Since 0.12.0 the Live Map has been opening at the world view
    every time you reload the page, instead of returning to wherever
    you panned and zoomed last. Your last position and zoom level now
    stick across reloads again. Nothing to reconfigure.

- version: "0.12.5"
  date: "2026-05-02"
  style: info
  schema_version: 1
  title: "Fix: light themes stuck after switching from a dark one on Windows"
  link: "#/preferences"
  body: |
    If you switched Graywolf to a dark theme on a Windows machine
    that has the Windows dark color scheme turned on, then tried to
    switch back to a light theme, the page stayed dark even though
    the picker showed the light choice. The light themes now win
    over the Windows dark setting, so picking Graywolf or Grayscale
    on Preferences puts the page back into light colors immediately.
    Nothing to reconfigure.

- version: "0.12.4"
  date: "2026-05-02"
  style: info
  schema_version: 1
  title: "AX.25 packet terminal (beta)"
  link: "#/terminal"
  body: |
    Graywolf can now connect to BBSes and other live packet stations
    right from the browser. Open the new Terminal tab in the sidebar,
    pick a radio channel, type the destination callsign, and you get a
    live AX.25 connected-mode session in an xterm-style window. Saved
    profiles, recents, transcripts, and an APRS packet monitor for
    listen-only channels are all built in.

    Before you can connect, set the channel mode on a radio channel
    to Packet or APRS+Packet on the Channels page. APRS-only channels
    will only let you watch the live packet feed, not open a session.

    This is a beta feature. If you hit a bug or something behaves
    strangely, please file an issue at
    https://github.com/chrissnell/graywolf/issues so it can get
    fixed.

- version: "0.12.3"
  date: "2026-04-30"
  style: info
  schema_version: 1
  title: "Windows: tip when your radio sends only carrier"
  link: "#/audio-devices"
  body: |
    If your radio keys up but transmits an unmodulated carrier
    instead of the usual AFSK packet tones, the cause on Windows is
    almost always the per-application or device volume being muted
    or set to zero. The Audio Devices page now shows a Windows-only
    tip pointing you at the Volume mixer and the Sound control
    panel Levels tab, and the handbook has a new troubleshooting
    section with the full checklist. Nothing to reconfigure -- this
    is guidance only.

- version: "0.12.2"
  date: "2026-04-30"
  style: info
  schema_version: 1
  title: "Windows: PTT works on COM10 and above"
  body: |
    On Windows, picking a serial PTT port numbered COM10 or higher
    (for example COM12) used to fail with "the system cannot find
    the file specified". Those ports now key the radio normally.
    Nothing to reconfigure.

- version: "0.12.1"
  date: "2026-04-30"
  style: info
  schema_version: 1
  title: "Offline maps for countries and provinces"
  body: |
    The offline maps drawer now lists every country, province, and
    US state available from the maps server, organized as a country
    tree. Open [Maps settings](#/preferences/maps), tap "Add a
    region", and pick what you want to download. Existing state
    downloads upgrade in place; nothing to reconfigure.
  link: "#/preferences/maps"

- version: "0.12.0"
  date: "2026-04-30"
  style: cta
  schema_version: 1
  title: "Brand new maps system, now with offline maps"
  body: |
    Graywolf ships a brand new [maps system](#/map). Stations,
    weather, trails, and highway shields render on a faster,
    higher-fidelity vector basemap.

    **To use the new maps, head to [Maps settings](#/preferences/maps)
    and register your callsign.** Registration takes a few seconds
    and unlocks both map sources:

    - **Graywolf private maps**: a free, hosted tile server. No
      third-party tracking, no API key juggling.
    - **Downloadable maps**: offline regional map bundles you pull
      onto the station once and use without an internet connection.
      Good for portable, EOC, or off-grid operation.

    Also new: opt-in long APRS messages up to 200 characters on the
    [Messages](#/messages) tab, and operator-selectable color themes
    (five canned looks) under [Preferences](#/preferences).

    Plus many other bug fixes and minor features.

- version: "0.11.4"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Log viewer improvements"
  body: |
    Improved display of packet types and processing in the [Log viewer](#/logs).

- version: "0.11.3"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Fix: Digipeater not matching rules"
  body: |
    Fixes a bug where the [Digipeater](#/digipeater) would silently
    ignore your rules on some channels. If your station had gone
    quiet, upgrading should bring it back.

- version: "0.11.2"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Leave tactical group chats from the thread header"
  body: |
    You can now leave a tactical group chat directly from the chat
    header. Click Leave Chat, confirm, and your station stops
    monitoring that tactical -- the conversation drops off your
    [Messages](#/messages) inbox and your APRS-IS subscription is
    updated so you no longer receive traffic for it. Message history
    for that tactical is preserved on the server as a read-only
    archive.

    Also in this release: the conversations list is always sectioned
    (Tactical, then Direct Messages), the Manage Tactical Chats
    button lives at the top of the list and is easier to spot, and
    tactical sender avatars and labels are easier to read at a
    glance.

- version: "0.11.1"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Messages gated in from APRS-IS now reach your chat"
  body: |
    Direct messages addressed to your callsign, and tactical messages
    addressed to one of your enabled tactical callsigns, that arrive
    over APRS-IS now show up on the [Messages](#/messages) tab.
    Previously Graywolf only classified messages heard over RF --
    anything delivered to you through the internet was silently
    dropped on the floor.

    This matters most for tactical chats where the sender is out of
    RF range and reaches you through APRS-IS.

    Also in this release: trying to send a message when no Station
    Callsign is configured now returns a clear error pointing you at
    [Station Callsigns](#/callsign), instead of a generic server
    error.

- version: "0.11.0"
  date: "2026-04-21"
  style: cta
  schema_version: 1
  title: "Station Callsign centralizes callsign configuration"
  body: |
    This version introduces a **Station Callsign**, which is used by
    the iGate, Digipeater, Beacons, and Messenger by default. You can
    override this callsign--or use an additional callsign--for the
    Digipeater and Beacons.

    Please visit the [Station Callsigns](#/callsign) tab to verify
    that your desired callsign is set.

- version: "0.10.11"
  date: "2026-04-18"
  style: info
  schema_version: 1
  title: "APRS Messaging"
  body: |
    Graywolf can now send and receive APRS direct messages and group
    messages. Try it out on the [Messages](#/messages) tab.
