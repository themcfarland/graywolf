# Authoritative list of user-facing release notes. Newest first.
# Plain English only. Plain ASCII only -- no emojis, no em dashes,
# no smart quotes, no non-ASCII punctuation. Keep the wording human
# and in the operator's voice; no package names, API paths, or other
# internals. style: info = informational announcement. style: cta =
# call-to-action (operator must do something). link: optional hash
# route the body references via [text](link) markdown; renderer only
# accepts internal #/... routes.

- version: "0.12.6"
  date: "2026-05-02"
  style: info
  schema_version: 1
  title: "Fix: Live Map forgets where you left it"
  link: "#/map"
  body: |
    Since 0.12.0 the Live Map has been opening at the world view
    every time you reload the page, instead of returning to wherever
    you panned and zoomed last. Your last position and zoom level now
    stick across reloads again. Nothing to reconfigure.

- version: "0.12.5"
  date: "2026-05-02"
  style: info
  schema_version: 1
  title: "Fix: light themes stuck after switching from a dark one on Windows"
  link: "#/preferences"
  body: |
    If you switched Graywolf to a dark theme on a Windows machine
    that has the Windows dark color scheme turned on, then tried to
    switch back to a light theme, the page stayed dark even though
    the picker showed the light choice. The light themes now win
    over the Windows dark setting, so picking Graywolf or Grayscale
    on Preferences puts the page back into light colors immediately.
    Nothing to reconfigure.

- version: "0.12.4"
  date: "2026-05-02"
  style: info
  schema_version: 1
  title: "AX.25 packet terminal (beta)"
  link: "#/terminal"
  body: |
    Graywolf can now connect to BBSes and other live packet stations
    right from the browser. Open the new Terminal tab in the sidebar,
    pick a radio channel, type the destination callsign, and you get a
    live AX.25 connected-mode session in an xterm-style window. Saved
    profiles, recents, transcripts, and an APRS packet monitor for
    listen-only channels are all built in.

    Before you can connect, set the channel mode on a radio channel
    to Packet or APRS+Packet on the Channels page. APRS-only channels
    will only let you watch the live packet feed, not open a session.

    This is a beta feature. If you hit a bug or something behaves
    strangely, please file an issue at
    https://github.com/chrissnell/graywolf/issues so it can get
    fixed.

- version: "0.12.3"
  date: "2026-04-30"
  style: info
  schema_version: 1
  title: "Windows: tip when your radio sends only carrier"
  link: "#/audio-devices"
  body: |
    If your radio keys up but transmits an unmodulated carrier
    instead of the usual AFSK packet tones, the cause on Windows is
    almost always the per-application or device volume being muted
    or set to zero. The Audio Devices page now shows a Windows-only
    tip pointing you at the Volume mixer and the Sound control
    panel Levels tab, and the handbook has a new troubleshooting
    section with the full checklist. Nothing to reconfigure -- this
    is guidance only.

- version: "0.12.2"
  date: "2026-04-30"
  style: info
  schema_version: 1
  title: "Windows: PTT works on COM10 and above"
  body: |
    On Windows, picking a serial PTT port numbered COM10 or higher
    (for example COM12) used to fail with "the system cannot find
    the file specified". Those ports now key the radio normally.
    Nothing to reconfigure.

- version: "0.12.1"
  date: "2026-04-30"
  style: info
  schema_version: 1
  title: "Offline maps for countries and provinces"
  body: |
    The offline maps drawer now lists every country, province, and
    US state available from the maps server, organized as a country
    tree. Open [Maps settings](#/preferences/maps), tap "Add a
    region", and pick what you want to download. Existing state
    downloads upgrade in place; nothing to reconfigure.
  link: "#/preferences/maps"

- version: "0.12.0"
  date: "2026-04-30"
  style: cta
  schema_version: 1
  title: "Brand new maps system, now with offline maps"
  body: |
    Graywolf ships a brand new [maps system](#/map). Stations,
    weather, trails, and highway shields render on a faster,
    higher-fidelity vector basemap.

    **To use the new maps, head to [Maps settings](#/preferences/maps)
    and register your callsign.** Registration takes a few seconds
    and unlocks both map sources:

    - **Graywolf private maps**: a free, hosted tile server. No
      third-party tracking, no API key juggling.
    - **Downloadable maps**: offline regional map bundles you pull
      onto the station once and use without an internet connection.
      Good for portable, EOC, or off-grid operation.

    Also new: opt-in long APRS messages up to 200 characters on the
    [Messages](#/messages) tab, and operator-selectable color themes
    (five canned looks) under [Preferences](#/preferences).

    Plus many other bug fixes and minor features.

- version: "0.11.4"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Log viewer improvements"
  body: |
    Improved display of packet types and processing in the [Log viewer](#/logs).

- version: "0.11.3"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Fix: Digipeater not matching rules"
  body: |
    Fixes a bug where the [Digipeater](#/digipeater) would silently
    ignore your rules on some channels. If your station had gone
    quiet, upgrading should bring it back.

- version: "0.11.2"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Leave tactical group chats from the thread header"
  body: |
    You can now leave a tactical group chat directly from the chat
    header. Click Leave Chat, confirm, and your station stops
    monitoring that tactical -- the conversation drops off your
    [Messages](#/messages) inbox and your APRS-IS subscription is
    updated so you no longer receive traffic for it. Message history
    for that tactical is preserved on the server as a read-only
    archive.

    Also in this release: the conversations list is always sectioned
    (Tactical, then Direct Messages), the Manage Tactical Chats
    button lives at the top of the list and is easier to spot, and
    tactical sender avatars and labels are easier to read at a
    glance.

- version: "0.11.1"
  date: "2026-04-21"
  style: info
  schema_version: 1
  title: "Messages gated in from APRS-IS now reach your chat"
  body: |
    Direct messages addressed to your callsign, and tactical messages
    addressed to one of your enabled tactical callsigns, that arrive
    over APRS-IS now show up on the [Messages](#/messages) tab.
    Previously Graywolf only classified messages heard over RF --
    anything delivered to you through the internet was silently
    dropped on the floor.

    This matters most for tactical chats where the sender is out of
    RF range and reaches you through APRS-IS.

    Also in this release: trying to send a message when no Station
    Callsign is configured now returns a clear error pointing you at
    [Station Callsigns](#/callsign), instead of a generic server
    error.

- version: "0.11.0"
  date: "2026-04-21"
  style: cta
  schema_version: 1
  title: "Station Callsign centralizes callsign configuration"
  body: |
    This version introduces a **Station Callsign**, which is used by
    the iGate, Digipeater, Beacons, and Messenger by default. You can
    override this callsign--or use an additional callsign--for the
    Digipeater and Beacons.

    Please visit the [Station Callsigns](#/callsign) tab to verify
    that your desired callsign is set.

- version: "0.10.11"
  date: "2026-04-18"
  style: info
  schema_version: 1
  title: "APRS Messaging"
  body: |
    Graywolf can now send and receive APRS direct messages and group
    messages. Try it out on the [Messages](#/messages) tab.
