      freq:
        type: string
      freq_offset:
        type: string
      gain:
        type: integer
      height:
        type: integer
      interval:
        type: integer
      latitude:
        type: number
      longitude:
        type: number
      messaging:
        type: boolean
      object_name:
        type: string
      overlay:
        type: string
      path:
        type: string
      power:
        type: integer
      sb_fast_rate:
        type: integer
      sb_fast_speed:
        type: integer
      sb_min_turn_time:
        type: integer
      sb_slow_rate:
        type: integer
      sb_slow_speed:
        type: integer
      sb_turn_angle:
        type: integer
      sb_turn_slope:
        type: integer
      send_to_aprs_is:
