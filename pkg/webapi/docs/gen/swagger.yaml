basePath: /api
definitions:
  aprs.Capabilities:
    properties:
      entries:
        additionalProperties:
          type: string
        description: key → value (value empty for flag entries)
        type: object
    type: object
  aprs.DecodedAPRSPacket:
    properties:
      caps:
        $ref: '#/definitions/aprs.Capabilities'
      channel:
        type: integer
      comment:
        description: residual free-form text after structured fields
        type: string
      dest:
        type: string
      df:
        $ref: '#/definitions/aprs.DirectionFinding'
      direction:
        allOf:
          - $ref: '#/definitions/aprs.Direction'
        description: |-
          Direction identifies the ingress path: DirectionRF for packets heard
          over RF via the modem bridge / KISS / AGW, DirectionIS for packets
          received from APRS-IS by the iGate. Unset (DirectionUnknown) when
          the packet is synthesized (e.g. inner third-party decode, tests) or
          constructed before ingress provenance is known.
      item:
        $ref: '#/definitions/aprs.Item'
      message:
        $ref: '#/definitions/aprs.Message'
      micE:
        $ref: '#/definitions/aprs.MicE'
      object:
        $ref: '#/definitions/aprs.Object'
      path:
        items:
          type: string
        type: array
      position:
        $ref: '#/definitions/aprs.Position'
      quality:
        description: modem-reported quality (0..100) if available
        type: integer
      raw:
        description: original AX.25 frame bytes
        items:
          type: integer
        type: array
      source:
        description: callsign-SSID
        type: string
      status:
        description: for '>' status reports
        type: string
      telemetry:
        $ref: '#/definitions/aprs.Telemetry'
      telemetryMeta:
        allOf:
          - $ref: '#/definitions/aprs.TelemetryMeta'
        description: PARM/UNIT/EQNS/BITS metadata (APRS101 ch 13)
      thirdParty:
        allOf:
          - $ref: '#/definitions/aprs.DecodedAPRSPacket'
        description: recursively-decoded inner packet for '}' traffic (APRS101 ch 20)
      timestamp:
        type: string
      type:
        $ref: '#/definitions/aprs.PacketType'
      weather:
        $ref: '#/definitions/aprs.Weather'
    type: object
  aprs.DeviceInfo:
    properties:
      class:
        type: string
      model:
        type: string
      vendor:
        type: string
    type: object
  aprs.Direction:
    enum:
      - ""
      - rf
      - is
    type: string
    x-enum-varnames:
      - DirectionUnknown
      - DirectionRF
      - DirectionIS
  aprs.DirectionFinding:
    properties:
      bearing:
        description: degrees true
        type: integer
      number:
        description: 0..9 station count
        type: integer
      quality:
        description: 0..9
        type: integer
      range:
        description: miles
        type: integer
    type: object
  aprs.Item:
    properties:
      comment:
        type: string
      live:
        type: boolean
      name:
        type: string
      position:
        $ref: '#/definitions/aprs.Position'
    type: object
  aprs.Message:
    properties:
      addressee:
        description: 1..9 chars, space-padded in packet
        type: string
      hasReplyAck:
        description: true if a reply-ack trailer was present (ack may still be "")
        type: boolean
      isAck:
        type: boolean
      isBulletin:
        description: addressee starts with BLN
        type: boolean
      isNWS:
        description: NWS-originated
        type: boolean
      isRej:
        type: boolean
      messageID:
        description: optional identifier used for ACK/REJ correlation
        type: string
      replyAck:
        description: piggybacked reply-ack id (aprs11/replyacks), empty if absent
        type: string
      text:
        type: string
    type: object
  aprs.MicE:
    properties:
      manufacturer:
        description: e.g. "Kenwood TH-D74", "" if unknown
        type: string
      messageCode:
        description: 0..7 index into the standard Mic-E message table
        type: integer
      messageText:
        type: string
      position:
        $ref: '#/definitions/aprs.Position'
      status:
        description: trailing status text
        type: string
    type: object
  aprs.Object:
    properties:
      comment:
        type: string
      live:
        type: boolean
      name:
        type: string
      position:
        $ref: '#/definitions/aprs.Position'
      timestamp:
        type: string
    type: object
  aprs.PHG:
    properties:
      directivity:
        description: 0=omni, 1..8 = 45°·d compass direction (N, NE, E, …)
        type: integer
      gainDB:
        description: g dB (0..9)
        type: integer
      heightFt:
        description: 10·2^h feet above average terrain
        type: integer
      powerWatts:
        description: p² watts
        type: integer
      raw:
        description: four-digit "phgd" body (e.g. "7700"); never includes the "PHG" prefix
        type: string
    type: object
  aprs.PacketType:
    enum:
      - unknown
      - position
      - message
      - telemetry
      - weather
      - object
      - item
      - mic-e
      - status
      - capabilities
      - df-report
      - query
      - third-party
    type: string
    x-enum-varnames:
      - PacketUnknown
      - PacketPosition
      - PacketMessage
      - PacketTelemetry
      - PacketWeather
      - PacketObject
      - PacketItem
      - PacketMicE
      - PacketStatus
      - PacketCapabilities
      - PacketDF
      - PacketQuery
      - PacketThirdParty
  aprs.Position:
    properties:
      altitude:
        description: meters (0 if none reported)
        type: number
      ambiguity:
        description: 0..4, digits of ambiguity introduced by spaces
        type: integer
      compressed:
        type: boolean
      course:
        description: degrees true (0..359)
        type: integer
      daodatum:
        description: DAO datum byte (APRS101 DAO extension), 0 if not present
        type: integer
      hasAlt:
        type: boolean
      hasCourse:
        type: boolean
      latitude:
        description: decimal degrees, positive north
        type: number
      localTime:
        description: true if the timestamp was the '/' local-time form (APRS101 ch 6)
        type: boolean
      longitude:
        description: decimal degrees, positive east
        type: number
      phg:
        allOf:
          - $ref: '#/definitions/aprs.PHG'
        description: decoded Power/Height/Gain/Directivity extension (APRS101 ch 7), nil if not present
      speed:
        description: knots
        type: number
      symbol:
        $ref: '#/definitions/aprs.Symbol'
      timestamp:
        description: nil if positionless or no embedded time
        type: string
    type: object
  aprs.Symbol:
    properties:
      code:
        type: integer
      table:
        type: integer
    type: object
  aprs.Telemetry:
    properties:
      analog:
        items:
          type: number
        type: array
      analogHas:
        description: true for channels actually reported (distinguishes 0 from missing)
        items:
          type: boolean
        type: array
      comment:
        description: trailing free-form
        type: string
      digital:
        description: bits 0..7 (only lower 8)
        type: integer
      hasDigital:
        type: boolean
      seq:
        description: 0..999, -1 if absent
        type: integer
    type: object
  aprs.TelemetryMeta:
    properties:
      bits:
        description: BITS. sense-bits bitmap (active-high per bit)
        type: integer
      eqns:
        description: a, b, c coefficients per analog channel
        items:
          items:
            type: number
          type: array
        type: array
      kind:
        description: '"parm", "unit", "eqns", or "bits"'
        type: string
      parm:
        items:
          type: string
        type: array
      projectName:
        description: BITS. project title
        type: string
      unit:
        items:
          type: string
        type: array
    type: object
  aprs.Weather:
    properties:
      hasHumidity:
        type: boolean
      hasLuminosity:
        type: boolean
      hasPressure:
        type: boolean
      hasRain1h:
        type: boolean
      hasRain24h:
        type: boolean
      hasRainMid:
        type: boolean
      hasRawRain:
        type: boolean
      hasSnow:
        type: boolean
      hasTemp:
        type: boolean
      hasWindDir:
        type: boolean
      hasWindGust:
        type: boolean
      hasWindSpeed:
        type: boolean
      humidity:
        description: percent (0..100)
        type: integer
      luminosity:
        description: watts/m^2
        type: integer
      pressure:
        description: tenths of millibar (e.g. 10132 = 1013.2)
        type: number
      rain1Hour:
        description: hundredths of an inch
        type: number
      rain24Hour:
        type: number
      rainSinceMid:
        type: number
      rawRainCounter:
        description: raw rain counter ('#' field)
        type: integer
      snowfall24h:
        description: inches (via 's' after 'g')
        type: number
      softwareType:
        description: one-letter software code (e.g. 'w', 'x', 'd')
        type: string
      temperature:
        description: degrees F
        type: number
      weatherUnitTag:
        description: 2..4 ASCII letters identifying the unit/model
        type: string
      windDirection:
        description: degrees true
        type: integer
      windGust:
        description: mph (5-minute peak)
        type: number
      windSpeed:
        description: mph (1-minute sustained)
        type: number
    type: object
  configstore.Referrer:
    properties:
      id:
        type: integer
      name:
        type: string
      type:
        type: string
    type: object
  dto.AcceptInviteRequest:
    properties:
      callsign:
        description: |-
          Callsign is the tactical label to subscribe to. Required. Must
          match the APRS tactical syntax (1-9 of [A-Z0-9-]) after uppercase
          normalization.
        type: string
      source_message_id:
        description: |-
          SourceMessageID, when non-zero, identifies the inbound invite
          message that triggered the accept. Used only for audit — the
          handler sets InviteAcceptedAt on that row if it resolves to a
          valid invite for the same tactical. Zero = accept without audit.
        type: integer
    required:
      - callsign
    type: object
  dto.AcceptInviteResponse:
    properties:
      already_member:
        description: |-
          AlreadyMember is true when the operator was already subscribed
          and enabled before this request. Lets the UI suppress the
          "Joined TAC" toast and emit "Already a member" instead.
        type: boolean
      tactical:
        allOf:
          - $ref: '#/definitions/dto.TacticalCallsignResponse'
        description: |-
          Tactical is the post-accept state of the subscription. Always
          populated with Enabled=true (accept is the "turn it on" verb).
    type: object
  dto.AgwRequest:
    properties:
      callsigns:
        type: string
      enabled:
        type: boolean
      listen_addr:
        type: string
    type: object
  dto.AgwResponse:
