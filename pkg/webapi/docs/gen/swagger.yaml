          schema:
            $ref: '#/definitions/webtypes.ErrorResponse'
      security:
        - CookieAuth: []
      summary: Send beacon now
      tags:
        - beacons
  /channels:
    get:
      operationId: listChannels
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ChannelResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/webtypes.ErrorResponse'
      security:
        - CookieAuth: []
      summary: List channels
      tags:
        - channels
    post:
      consumes:
        - application/json
      operationId: createChannel
      parameters:
        - description: Channel definition
          in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/dto.ChannelRequest'
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ChannelResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/webtypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/webtypes.ErrorResponse'
      security:
        - CookieAuth: []
      summary: Create channel
      tags:
        - channels
