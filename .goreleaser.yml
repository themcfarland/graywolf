version: 2

project_name: graywolf

before:
  hooks:
    - go mod tidy

builds:
  - id: graywolf
    binary: graywolf
    main: ./cmd/graywolf/
    env:
      - CGO_ENABLED=0
    ldflags:
      - -w
      - -s
      - -X main.Version={{.Version}}
      - -X main.GitCommit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      # FOLLOWUP: armv6 (Go GOARCH=arm GOARM=6) build temporarily
      # removed for v0.13.6. The Rust modem cross-compile broke on
      # cross-rs upstream image changes; without rust-bin/linux_arm
      # to package against, the Go arm6 archive would have no modem
      # binary. Restore - arm + goarm: ["6"] when the Rust side is
      # fixed; see project memory project_followup_armv6_release.
      # - arm
    # goarm:
    #   - "6"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm

archives:
  - id: graywolf
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if and (eq .Arch "arm") (eq .Arm "6") }}armv6l
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE*
      - README*
      - src: "rust-bin/{{ .Os }}_{{ .Arch }}/graywolf-modem{{ if eq .Os \"windows\" }}.exe{{ end }}"
        dst: .
        strip_parent: true

nfpms:
  - id: graywolf
    package_name: graywolf
    vendor: chrissnell
    homepage: https://github.com/chrissnell/graywolf
    maintainer: Chris Snell
    description: APRS radio transceiver, digipeater, and Internet gateway
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/graywolf.service
        dst: /usr/lib/systemd/system/graywolf.service
      - src: packaging/udev/99-graywolf-cm108.rules
        dst: /etc/udev/rules.d/99-graywolf-cm108.rules
        type: config
      - src: "rust-bin/linux_{{ .Arch }}/graywolf-modem"
        dst: /usr/bin/graywolf-modem
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh

dockers:
  - image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: amd64
    extra_files:
      - graywolf-modem-amd64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
  - image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser.arm64
    use: buildx
    goos: linux
    goarch: arm64
    extra_files:
      - graywolf-modem-arm64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"

docker_manifests:
  - name_template: "ghcr.io/chrissnell/graywolf:{{ .Tag }}"
    image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-amd64"
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/chrissnell/graywolf:latest"
    image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-amd64"
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-arm64"

checksum:
  name_template: checksums.txt

release:
  draft: false
  replace_existing_draft: true
  replace_existing_artifacts: true
  target_commitish: '{{ .Commit }}'
  prerelease: auto
  mode: replace

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Build and dependencies"
      regexp: '^.*?build(\([[:word:]]+\))??!?:.+$'
      order: 30
    - title: Misc
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

snapshot:
  version_template: "{{ .Version }}-{{.ShortCommit}}"
