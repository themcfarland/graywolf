// Graywolf modem ↔ application IPC protocol.
//
// Wire format: length-prefixed IpcMessage frames over a Unix domain socket.
// Each frame is [4 bytes big-endian length][IpcMessage protobuf bytes].
//
// All messages are wrapped in the IpcMessage oneof envelope so that a single
// bidirectional stream can carry both directions without a separate type tag.

syntax = "proto3";

package graywolf;

option go_package = "github.com/chrissnell/graywolf/pkg/ipcproto";

// ---------------------------------------------------------------------------
// Envelope
// ---------------------------------------------------------------------------

message IpcMessage {
  oneof payload {
    // Rust modem → Go application
    ReceivedFrame received_frame = 1;
    DcdChange dcd_change = 2;
    StatusUpdate status_update = 3;
    ModemReady modem_ready = 4;
    AudioDeviceList audio_device_list = 5;
    DeviceLevelUpdate device_level_update = 7;
    InputLevelScanResult input_level_scan_result = 8;
    TestSignalResult test_signal_result = 9;

    // Go application → Rust modem
    TransmitFrame transmit_frame = 10;
    ConfigureChannel configure_channel = 11;
    ConfigureAudio configure_audio = 12;
    ConfigurePtt configure_ptt = 13;
    StartAudio start_audio = 14;
    StopAudio stop_audio = 15;
    Shutdown shutdown = 16;
    EnumerateAudioDevices enumerate_audio_devices = 17;
    SetDeviceGain set_device_gain = 19;
    ScanInputLevels scan_input_levels = 20;
    ManualPtt manual_ptt = 21;           // Go → Rust: manual PTT toggle for testing
    TransmitTestSignal transmit_test_signal = 22;
  }
}

// ---------------------------------------------------------------------------
// Rust → Go
// ---------------------------------------------------------------------------

// A successfully decoded AX.25 frame with demodulator metadata.
message ReceivedFrame {
  uint32 channel = 1;          // logical radio channel
  uint32 subchan = 2;          // demodulator subchannel
  uint32 slice = 3;             // slicer index
  bytes data = 4;               // AX.25 frame bytes, FCS stripped
  int32 quality = 5;            // 0..100 decoder quality
  float audio_level_mark = 6;   // mark level at time of capture
  float audio_level_space = 7;  // space level at time of capture
  float speed_error = 8;        // baud-rate error, percent
  string retry = 9;             // "none" | "single" | "double"
  uint64 timestamp_ns = 10;     // monotonic capture time
}

// Data Carrier Detect state transition.
message DcdChange {
  uint32 channel = 1;
  uint32 subchan = 2;
  uint32 slice = 3;
  bool detected = 4;
  uint64 timestamp_ns = 5;
}

// Periodic health / metrics update. Consumed by Go for Prometheus export.
message StatusUpdate {
  uint32 channel = 1;
  uint64 rx_frames = 2;
  uint64 rx_bad_fcs = 3;
  uint64 tx_frames = 4;
  uint64 dcd_transitions = 5;
  float audio_level_mark = 6;
  float audio_level_space = 7;
  float audio_level_peak = 8;
  bool dcd_state = 9;
  bool shutdown_complete = 10;   // final status before process exit
  uint64 timestamp_ns = 11;
}

// Sent once after the modem has bound its IPC socket, accepted a connection,
// and is ready to receive configuration messages.
message ModemReady {
  string version = 1;
  uint64 pid = 2;
}

// Response to EnumerateAudioDevices.
message AudioDeviceList {
  uint32 request_id = 1;
  repeated AudioDeviceInfo devices = 2;
}

message AudioDeviceInfo {
  string name = 1;
  string stable_id = 2;          // stable identifier, or name if unavailable
  AudioDeviceKind kind = 3;
  repeated uint32 sample_rates = 4;
  repeated uint32 channel_counts = 5;
  string host_api = 6;           // "CoreAudio", "ALSA", "WASAPI"
  bool is_default = 7;
  string description = 8;        // human-friendly name (e.g. USB product string)
  bool recommended = 9;          // true for plughw: devices (ALSA software conversion)
}

enum AudioDeviceKind {
  AUDIO_DEVICE_KIND_UNSPECIFIED = 0;
  AUDIO_DEVICE_KIND_INPUT = 1;
  AUDIO_DEVICE_KIND_OUTPUT = 2;
}

// ---------------------------------------------------------------------------
// Go → Rust
// ---------------------------------------------------------------------------

// Request transmission of a raw AX.25 frame on a specific channel.
message TransmitFrame {
  uint32 channel = 1;
  bytes data = 2;               // AX.25 frame bytes, no FCS (modem appends)
  uint32 txdelay_override_ms = 3;  // 0 = use configured default
  uint32 txtail_override_ms = 4;
  uint32 priority = 5;          // higher = sooner
  // Monotonic correlation ID stamped at txgovernor.Governor.Submit (starts
  // at 1; zero = unstamped). Propagated through the dispatcher and every
  // TX backend for log correlation across partial-failure fan-outs.
  // Backward-compatible: older modems simply ignore the field.
  uint64 frame_id = 6;
}

// Configure a logical radio channel's demodulator parameters.
message ConfigureChannel {
  uint32 channel = 1;
  uint32 device_id = 2;         // audio device this channel reads from
  uint32 audio_channel = 3;     // 0=left / mono, 1=right
  uint32 baud = 4;              // 1200, 2400, 4800, 9600
  uint32 mark_freq = 5;
  uint32 space_freq = 6;
  string modem_type = 7;        // "afsk" (phase 1), "psk", "9600" later
  string profile = 8;           // "A" | "B"
  uint32 num_slicers = 9;
  string fix_bits = 10;         // "none" | "single" | "double"
  uint32 num_decoders = 11;     // multi-modem: number of parallel decoders
  int32 decoder_offset = 12;    // multi-modem: frequency offset step in Hz
  bool fx25_encode = 13;        // enable FX.25 RS FEC on transmit
  bool il2p_encode = 14;        // enable IL2P encoding on transmit
  uint32 input_device_id = 15;  // input audio device (replaces device_id)
  uint32 input_channel = 16;    // input stereo select (replaces audio_channel)
  uint32 output_device_id = 17; // output audio device, 0 = RX-only
  uint32 output_channel = 18;   // output stereo select

  // Multi-demodulator ensemble preset for AFSK. Overrides `profile` and
  // `num_slicers` when it resolves to a multi-demod preset. Known values:
  //   ""        — default, treated as "triple" (recommended for all new
  //               installs; matches or beats Direwolf -P AD+ on the
  //               WA8LMF reference tracks, costs ~1.6% of one CPU core)
  //   "triple"  — RECOMMENDED_3DEMOD: Profile A ×9 slicers + A ×9 with
  //               hard-limiter + Profile B ×9 slicers
  //   "dual"    — RECOMMENDED_2DEMOD: Profile A ×9 with and without HL
  //   "single"  — explicit legacy single-demodulator path; respects
  //               `profile` and `num_slicers`. Use when you need the
  //               lowest possible CPU or want to reproduce old behavior.
  // When a preset is active, output frames are deduped across the ensemble
  // using a 3-symbol time window (matching Direwolf's dedup semantics).
  string demod_ensemble = 19;
}

// Configure an audio source (soundcard, SDR UDP, stdin, FLAC file).
message ConfigureAudio {
  uint32 device_id = 1;
  string device_name = 2;       // cpal device name, "stdin", or file path
  uint32 sample_rate = 3;
  uint32 channels = 4;          // 1=mono, 2=stereo
  string source_type = 5;       // "soundcard" | "stdin" | "flac" | "flac_fast" | "sdr_udp"
                                // ("flac_fast" drives the FLAC decoder as
                                //  fast as possible with no realtime pacing,
                                //  intended for benchmarking / offline runs.)
  string format = 6;            // "s16le" | "f32" etc. (source-specific)
  float gain_db = 7;            // software gain in dB (-60 to +12), 0 = unity
}

// Configure PTT (push-to-talk) control for a channel.
message ConfigurePtt {
  uint32 channel = 1;
  string method = 2;            // "serial_rts" | "serial_dtr" | "gpio" | "cm108" | "rigctld" | "vox" | "digirig_tone" | "none"
  // device is interpreted by the selected method:
  //   - serial_rts/serial_dtr → filesystem device path, e.g. "/dev/ttyUSB0"
  //   - cm108                 → HID device path, e.g. "/dev/hidraw0"
  //   - rigctld               → "host:port", e.g. "localhost:4532" (IPv4/hostname only; no IPv6 bracketing)
  //   - gpio                  → gpiochip device path, e.g. "/dev/gpiochip0"
  //   - vox                   → ignored (radio keys on audio; a lead-in tone is prepended)
  //   - digirig_tone          → ignored (Digirig Lite keys on a tone the audio path puts on the companion channel)
  //   - none                  → ignored
  //
  // If a fourth PTT method needs to overload this field, migrate to a
  // structured `endpoint` oneof instead of piling on more string schemas.
  string device = 3;
  uint32 txdelay_ms = 4;
  uint32 txtail_ms = 5;
  uint32 slottime_ms = 6;
  uint32 persist = 7;           // p-persistence 0..255
  uint32 dwait_ms = 8;
  bool invert = 9;              // reverse polarity for rigs wired backwards
  // CM108 GPIO pin number (1-indexed, default: 3). Not used for `gpio` method
  // (which uses `gpio_line` instead to avoid indexing ambiguity).
  uint32 gpio_pin = 10;
  // 0-indexed GPIO line offset for the `gpio` method (gpiochip chardev v2).
  // For CM108, use `gpio_pin` (1-indexed) instead.
  uint32 gpio_line = 11;
  // Android USB-PTT transport selector. Carries the PttMethod enum value
  // (proto/platform.proto: 1=PTT_METHOD_CP2102N_RTS, 2=PTT_METHOD_CM108_HID,
  // 3=PTT_METHOD_AIOC_CDC_DTR, 4=PTT_METHOD_VOX,
  // 5=PTT_METHOD_DIGIRIG_TONE). Typed uint32 (not the
  // platform.proto enum) to keep this IPC contract self-contained
  // (invariant #2). Meaningful only when method=="android"; 0 otherwise.
  // Never overload gpio_pin for this.
  uint32 ptt_method = 12;
}

// Begin audio processing on all configured devices.
message StartAudio {}

// Stop audio processing (for device hot-swap). Safe to follow with a new
// ConfigureAudio + StartAudio sequence.
message StopAudio {}

// Graceful shutdown: finish current TX, deassert PTT, drain queues, exit.
message Shutdown {
  uint32 timeout_ms = 1;        // max time to wait for drain, 0 = use default
}

// Request enumeration of available audio devices.
message EnumerateAudioDevices {
  uint32 request_id = 1;        // echoed back in AudioDeviceList
  bool include_output = 2;      // include output devices in response
}

// Set software gain for an audio device (live update, no restart).
message SetDeviceGain {
  uint32 device_id = 1;
  float gain_db = 2;            // -60.0 to +12.0, 0.0 = unity
}

// Per-device audio level report, emitted ~5 Hz by the modem.
message DeviceLevelUpdate {
  uint32 device_id = 1;
  float peak_dbfs = 2;          // instantaneous peak in dBFS
  float rms_dbfs = 3;           // RMS level in dBFS
  bool clipping = 4;            // true if post-gain samples exceeded -1 dBFS
}

// Request a brief input level scan on all available input devices.
message ScanInputLevels {
  uint32 request_id = 1;        // echoed back in InputLevelScanResult
  uint32 duration_ms = 2;       // how long to sample each device (default 500ms)
}

// Manual PTT toggle for SPA testing. The PTT driver for the channel must
// already be registered via ConfigurePtt. A 10-second Go-side watchdog
// auto-unkeys if no heartbeat arrives.
message ManualPtt {
  uint32 channel = 1;  // logical channel
  bool keyed = 2;      // true = key, false = unkey
}

// Result of an input level scan.
message InputLevelScanResult {
  uint32 request_id = 1;
  repeated InputDeviceLevel devices = 2;
}

// Level reading for a single input device.
message InputDeviceLevel {
  string name = 1;              // cpal device name
  float peak_dbfs = 2;          // peak level during scan
  bool has_signal = 3;          // true if peak > -40 dBFS
  string error = 4;             // non-empty if device couldn't be opened
}

// Go -> Rust: transmit a TX test signal on a channel. kind selects the
// generator: 0 = station callsign in CW, 1 = steady tone, 2 = alternating
// tone. Go fills the relevant parameters; the modem is a pure renderer.
message TransmitTestSignal {
  uint32 request_id = 1;     // echoed back in TestSignalResult
  uint32 channel = 2;        // selects output device + PTT driver
  uint32 kind = 3;           // 0=CW callsign, 1=steady tone, 2=alternating
  string callsign = 4;       // kind 0; already resolved + uppercased by Go
  uint32 cw_wpm = 5;         // kind 0
  uint32 freq_a_hz = 6;      // CW sidetone (0) / tone (1) / tone A (2)
  uint32 freq_b_hz = 7;      // tone B (kind 2)
  uint32 duration_ms = 8;    // kinds 1, 2
  uint32 alt_period_ms = 9;  // kind 2: ms per tone before switching
}

// Result of a TX test-signal submission to the TX worker.
message TestSignalResult {
  uint32 request_id = 1;
  bool success = 2;
  string error = 3;          // empty on success
}
